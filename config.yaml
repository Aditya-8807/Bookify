llm:
  # Switch provider here — that's the only change needed.
  # gemini    → model: gemini-2.0-flash    key: GEMINI_API_KEY
  #              model: gemini-2.5-flash    key: GEMINI_API_KEY
  # openai    → model: gpt-4o              key: OPENAI_API_KEY
  # anthropic → model: claude-opus-4-7     key: ANTHROPIC_API_KEY
  provider: gemini
  model: gemini-2.0-flash
  temperature: 0.3

pipeline:
  batch_size: 4           # parallel videos per mini-batch
  rate_limit_rpm: 8       # keep requests slower for free-tier reliability

paths:
  checkpoints: checkpoints
  output: output
